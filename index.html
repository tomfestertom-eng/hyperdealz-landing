<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPERDEALZ - Closed Access Terminal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        black: '#000000',
                        charcoal: '#121212',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <style type="text/tailwindcss">
        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lux-card {
            background-color: #121212;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        /* Webkit Autofill Style Override für absolute Schwarz-Ästhetik */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #050505 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        
        .gold-text-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-amber-500 via-yellow-400 to-yellow-600;
        }
        
        .gold-bg-gradient {
            @apply bg-gradient-to-r from-amber-500 via-yellow-400 to-yellow-600;
        }

        /* Pulse animation for the system dot */
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="p-4 antialiased selection:bg-yellow-500 selection:text-black">

    <!-- System Status Bar (Top) -->
    <div class="fixed top-8 left-1/2 -translate-x-1/2 flex flex-col items-center text-center space-y-2 z-10 w-full">
        <h1 class="text-lg sm:text-xl font-medium tracking-[0.4em] gold-text-gradient">
            HYPERDEALZ
        </h1>
        <div class="flex items-center space-x-2 text-[10px] sm:text-xs tracking-[0.2em] text-gray-500">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-subtle-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
            <span>SYSTEM AKTIV / PRE-LAUNCH</span>
        </div>
    </div>

    <!-- Main Terminal Card -->
    <main class="w-full max-w-[420px] relative mt-16 sm:mt-0">
        <!-- Subtle background glow -->
        <div class="absolute inset-0 bg-yellow-500/5 blur-3xl rounded-full translate-y-4"></div>

        <div class="lux-card rounded-[20px] p-8 sm:p-10 relative overflow-hidden transition-all duration-700">
            
            <form id="waitlist-form" class="relative">
                <p class="text-[11px] text-gray-500 mb-6 text-center tracking-[0.2em] uppercase">
                    Secured Terminal Access
                </p>

                <div class="relative flex items-center group">
                    <input 
                        type="email" 
                        id="email-input" 
                        name="email"
                        placeholder="mail@domain.tld" 
                        required
                        class="w-full bg-[#050505] border border-white/5 text-white pl-5 pr-14 py-4 rounded-xl outline-none focus:border-yellow-600/50 focus:bg-black transition-all duration-500 font-light placeholder-gray-700 tracking-wider text-sm shadow-inner"
                    >
                    
                    <button 
                        type="submit" 
                        id="submit-btn"
                        title="Zutritt anfordern"
                        class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center gold-bg-gradient rounded-lg hover:shadow-[0_0_15px_rgba(245,158,11,0.3)] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed group-focus-within:opacity-100"
                    >
                        <!-- Arrow Icon -->
                        <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </div>

                <div id="error-message" class="hidden mt-5 text-center">
                    <p class="text-red-500/80 font-light text-xs tracking-wide"></p>
                </div>
            </form>

            <!-- VIP Counter Animation Area -->
            <div id="success-message" class="hidden py-2 flex flex-col items-center">
                <p class="text-gray-500 font-light text-[10px] uppercase tracking-[0.3em] mb-5">
                    Access Granted
                </p>
                
                <div class="text-5xl sm:text-6xl font-light tracking-wider gold-text-gradient font-mono mb-3" id="vip-counter">
                    #0000
                </div>
                
                <p class="text-gray-600/80 font-light text-[10px] sm:text-xs tracking-[0.15em] uppercase mt-4 flex items-center">
                    <svg class="w-3 h-3 mr-2 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    VIP STATUS CONFIRMED
                </p>
            </div>
        </div>
    </main>

    <script>
        // --- Supabase Configuration ---
        const NEXT_PUBLIC_SUPABASE_URL = 'https://lefdgxbkzmgwkgywvhet.supabase.co';
        const NEXT_PUBLIC_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlZmRneGJrem1nd2tneXd2aGV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjE5MzgsImV4cCI6MjA5ODk5NzkzOH0.383Hu1-s57UHX8NvKFsv8TnrJQSh0fncwH2nQbEqpg0';
        
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elemente ---
            const form = document.getElementById('waitlist-form');
            const emailInput = document.getElementById('email-input');
            const submitBtn = document.getElementById('submit-btn');
            const successMessage = document.getElementById('success-message');
            const errorMessage = document.getElementById('error-message');
            const errorText = errorMessage.querySelector('p');

            // --- Supabase Initialisierung absichern ---
            let supabase;
            try {
                if (typeof window.supabase !== 'undefined') {
                    supabase = window.supabase.createClient(NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY);
                } else {
                    console.error('Supabase CDN konnte nicht geladen werden.');
                }
            } catch (err) {
                console.error('Fehler bei der Supabase Initialisierung:', err);
            }

            function isValidEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            // --- Event Listener ---
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                
                if (!supabase) {
                    errorText.textContent = 'Systemfehler: Verbindung blockiert (Adblocker?).';
                    errorMessage.classList.remove('hidden');
                    return;
                }

                if (!email || !isValidEmail(email)) {
                    errorText.textContent = 'Ungültige E-Mail-Adresse.';
                    errorMessage.classList.remove('hidden');
                    return;
                }

                // UI State: Loading (Minimize icon, show loading spinner)
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<svg class="animate-spin w-4 h-4 text-black" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
                errorMessage.classList.add('hidden');
                emailInput.disabled = true;

                try {
                    // Supabase Insert
                    const { error } = await supabase
                        .from('leads')
                        .insert([{ email }]);

                    if (error) {
                        throw error;
                    }

                    // UI State: Success (Formular ausblenden)
                    form.style.opacity = '0';
                    setTimeout(() => {
                        form.style.display = 'none';
                        successMessage.classList.remove('hidden');
                        successMessage.style.opacity = '0';
                        
                        // Fade in Success Message
                        requestAnimationFrame(() => {
                            successMessage.style.transition = 'opacity 0.6s ease';
                            successMessage.style.opacity = '1';
                        });

                        // --- VIP Zähler Animation ---
                        const counterElement = document.getElementById('vip-counter');
                        const targetVipNumber = Math.floor(Math.random() * 8900) + 100;
                        const duration = 1500; // 1.5 Sekunden
                        const startTimestamp = performance.now();

                        function animateCounter(timestamp) {
                            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                            const easeOut = 1 - Math.pow(1 - progress, 4);
                            const currentNumber = Math.floor(easeOut * targetVipNumber);
                            
                            counterElement.textContent = '#' + currentNumber.toString().padStart(4, '0');

                            if (progress < 1) {
                                requestAnimationFrame(animateCounter);
                            } else {
                                counterElement.textContent = '#' + targetVipNumber.toString().padStart(4, '0');
                                // Haptisches Feedback
                                if (navigator.vibrate) {
                                    navigator.vibrate([100]);
                                }
                            }
                        }
                        requestAnimationFrame(animateCounter);

                    }, 400); // 400ms nach dem opacity fade-out

                } catch (error) {
                    console.error('Fehler:', error);
                    
                    let errorMsgText = 'Systemfehler. Bitte versuchen Sie es später.';
                    if (error.code === '23505') {
                        errorMsgText = 'Access bereits reserviert.';
                    } else if (error.message) {
                        errorMsgText = error.message;
                    }
                    
                    errorText.textContent = errorMsgText;
                    errorMessage.classList.remove('hidden');
                    
                    // UI State: Reset
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
                    emailInput.disabled = false;
                    emailInput.focus();
                }
            });
        });
    </script>
</body>
</html>
